name: Run DB Migration

on:
  workflow_dispatch:
  push:
    branches: ["claude/understand-repo-XsHjD"]
    paths: ["migrations/**", ".github/workflows/migrate.yml"]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm install

      - name: Run migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npm run migrate
