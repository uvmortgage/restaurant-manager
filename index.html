
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Inchin's Bamboo Garden — RestoHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ibg: {
                50:  '#f0fdf9',
                100: '#ccfbef',
                200: '#99f6e0',
                300: '#5eead4',
                400: '#2dd4bf',
                500: '#14b8a6',
                600: '#0d9488',
                700: '#0f766e',
                800: '#115e59',
                900: '#134e4a',
              }
            },
            fontFamily: {
              sans: ['Manrope', 'Inter', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Manrope', 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
        background: linear-gradient(165deg, #0c1821 0%, #162028 30%, #1a2a2e 60%, #0f2027 100%);
        min-height: 100vh;
      }
      .signature-canvas {
        touch-action: none;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn { animation: fadeIn 0.25s ease-out; }

      /* ─── Global Dark Theme Overrides ─────────────────────────────────── */

      /* Background overrides */
      .bg-slate-50,
      .bg-white {
        background-color: rgba(15, 23, 30, 0.95) !important;
      }

      /* Card-like containers — subtle glass effect */
      .bg-white.rounded-2xl,
      .bg-white.rounded-3xl,
      .bg-white.rounded-xl,
      div[class*="bg-white"][class*="rounded"],
      div[class*="bg-white"][class*="border"] {
        background: rgba(20, 30, 40, 0.8) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
        backdrop-filter: blur(12px);
      }

      /* Nested card sections (like category groups in product list) */
      .bg-slate-50.border-b {
        background-color: rgba(15, 25, 35, 0.9) !important;
        border-color: rgba(255, 255, 255, 0.06) !important;
      }

      /* Hover states */
      button:hover .bg-slate-50,
      button.hover\:bg-slate-50:hover,
      *[class*="hover:bg-slate-50"]:hover {
        background-color: rgba(20, 35, 45, 0.9) !important;
      }

      /* Text overrides */
      .text-slate-900,
      .text-slate-800,
      .text-slate-700 {
        color: rgba(255, 255, 255, 0.92) !important;
      }
      .text-slate-600 {
        color: rgba(255, 255, 255, 0.7) !important;
      }
      .text-slate-500 {
        color: rgba(255, 255, 255, 0.5) !important;
      }
      .text-slate-400 {
        color: rgba(255, 255, 255, 0.35) !important;
      }
      .text-slate-300 {
        color: rgba(255, 255, 255, 0.25) !important;
      }

      /* Border overrides */
      .border-slate-100,
      .border-slate-200,
      .border-slate-50 {
        border-color: rgba(255, 255, 255, 0.08) !important;
      }
      .divide-slate-50 > :not([hidden]) ~ :not([hidden]),
      .divide-slate-100 > :not([hidden]) ~ :not([hidden]) {
        border-color: rgba(255, 255, 255, 0.06) !important;
      }

      /* Form inputs */
      input[type="text"],
      input[type="number"],
      input[type="email"],
      input[type="date"],
      input[type="password"],
      input[type="search"],
      textarea,
      select {
        background-color: rgba(10, 18, 25, 0.9) !important;
        border-color: rgba(255, 255, 255, 0.12) !important;
        color: rgba(255, 255, 255, 0.9) !important;
      }
      input::placeholder,
      textarea::placeholder {
        color: rgba(255, 255, 255, 0.25) !important;
      }
      select option {
        background-color: #0f1820 !important;
        color: rgba(255, 255, 255, 0.9) !important;
      }
      input:focus, textarea:focus, select:focus {
        border-color: rgba(20, 184, 166, 0.5) !important;
        box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.2) !important;
      }

      /* Checkboxes */
      input[type="checkbox"] {
        accent-color: #14b8a6;
      }

      /* Tab bar */
      .bg-white.border-b {
        background-color: rgba(12, 20, 28, 0.95) !important;
        border-color: rgba(255, 255, 255, 0.06) !important;
      }

      /* Sticky footer / bottom bars */
      .bg-white.border-t,
      div[class*="bg-white"][class*="border-t"] {
        background: rgba(12, 20, 28, 0.97) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
        backdrop-filter: blur(16px);
      }

      /* Header bar — keep the teal but deepen it */
      .bg-ibg-600 {
        background: linear-gradient(135deg, #0d9488 0%, #0a7c72 50%, #0f766e 100%) !important;
      }

      /* Colored badges on dark — boost opacity */
      .bg-ibg-50 {
        background-color: rgba(20, 184, 166, 0.1) !important;
      }
      .bg-ibg-100 {
        background-color: rgba(20, 184, 166, 0.15) !important;
      }

      /* Status & type badges — make slightly more vivid on dark */
      .bg-slate-100.text-slate-600 {
        background-color: rgba(100, 116, 139, 0.2) !important;
        color: rgba(255, 255, 255, 0.6) !important;
      }
      .bg-amber-100.text-amber-700 {
        background-color: rgba(245, 158, 11, 0.15) !important;
      }
      .bg-emerald-100.text-emerald-700 {
        background-color: rgba(16, 185, 129, 0.15) !important;
      }
      .bg-blue-100.text-blue-700 {
        background-color: rgba(59, 130, 246, 0.15) !important;
      }
      .bg-teal-100.text-teal-700 {
        background-color: rgba(20, 184, 166, 0.15) !important;
      }
      .bg-purple-100.text-purple-700 {
        background-color: rgba(168, 85, 247, 0.15) !important;
      }
      .bg-indigo-100.text-indigo-700 {
        background-color: rgba(99, 102, 241, 0.15) !important;
      }

      /* Light tinted backgrounds */
      .bg-orange-50 {
        background-color: rgba(249, 115, 22, 0.12) !important;
      }
      .bg-emerald-50 {
        background-color: rgba(16, 185, 129, 0.12) !important;
      }
      .bg-rose-50 {
        background-color: rgba(244, 63, 94, 0.12) !important;
      }
      .bg-sky-50 {
        background-color: rgba(14, 165, 233, 0.12) !important;
      }
      .bg-violet-50 {
        background-color: rgba(139, 92, 246, 0.12) !important;
      }
      .bg-indigo-50 {
        background-color: rgba(99, 102, 241, 0.12) !important;
      }

      /* Disabled/muted buttons */
      .bg-slate-100.text-slate-400,
      .bg-slate-100.cursor-not-allowed {
        background-color: rgba(30, 40, 50, 0.8) !important;
        color: rgba(255, 255, 255, 0.25) !important;
      }

      /* Selected product row */
      .bg-ibg-50\/30 {
        background-color: rgba(20, 184, 166, 0.05) !important;
      }

      /* Modals/sheets overlay */
      .bg-black\/40 {
        background-color: rgba(0, 0, 0, 0.6) !important;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Decorative background blobs — suppress on dark */
      .bg-ibg-100.rounded-full.blur-\[100px\],
      .bg-amber-100.rounded-full.blur-\[100px\] {
        opacity: 0.08 !important;
      }

      /* Loading spinner fix */
      .border-ibg-100 {
        border-color: rgba(20, 184, 166, 0.15) !important;
      }

      /* Notes/info backgrounds */
      .bg-indigo-50.border-indigo-100 {
        background-color: rgba(99, 102, 241, 0.1) !important;
        border-color: rgba(99, 102, 241, 0.2) !important;
      }
      .bg-ibg-50.border-ibg-200 {
        background-color: rgba(20, 184, 166, 0.1) !important;
        border-color: rgba(20, 184, 166, 0.2) !important;
      }
      .bg-rose-50.border-rose-200 {
        background-color: rgba(244, 63, 94, 0.1) !important;
        border-color: rgba(244, 63, 94, 0.2) !important;
      }

      /* Vendor chip background */
      .bg-slate-100.text-slate-500 {
        background-color: rgba(100, 116, 139, 0.15) !important;
        color: rgba(255, 255, 255, 0.5) !important;
      }

    </style>
</head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
